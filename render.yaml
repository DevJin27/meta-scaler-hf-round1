services:
  - type: keyvalue
    name: signal-game-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: signal-game-backend
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: signal-game-redis
          property: connectionString
      - key: ADMIN_SECRET
        generateValue: true
      - key: CLIENT_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: ROUND_DURATION_MS
        value: "10000"
      - key: INTER_ROUND_DELAY_MS
        value: "3000"
      - key: AUTO_ADVANCE_ROUNDS
        value: "true"
